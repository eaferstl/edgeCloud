<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#161b24"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#4f9cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4f9cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- decorative peer-to-peer mesh -->
  <g stroke="#2f7be0" stroke-width="2" opacity="0.5">
    <line x1="170" y1="470" x2="330" y2="540"/>
    <line x1="330" y1="540" x2="520" y2="500"/>
    <line x1="520" y1="500" x2="720" y2="545"/>
    <line x1="720" y1="545" x2="900" y2="495"/>
    <line x1="900" y1="495" x2="1040" y2="540"/>
    <line x1="170" y1="470" x2="520" y2="500"/>
    <line x1="520" y1="500" x2="900" y2="495"/>
  </g>
  <g fill="#4f9cff">
    <circle cx="170" cy="470" r="9"/>
    <circle cx="330" cy="540" r="9"/>
    <circle cx="520" cy="500" r="11"/>
    <circle cx="720" cy="545" r="9"/>
    <circle cx="900" cy="495" r="11"/>
    <circle cx="1040" cy="540" r="9"/>
  </g>

  <text x="84" y="210" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="120" font-weight="800" fill="#e6e9ef">☁️ edgeCloud</text>
  <text x="90" y="300" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="46" font-weight="600" fill="#4f9cff">Decentralized compute on everyday devices</text>
  <text x="90" y="372" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="34" fill="#9aa4b5">Submit a job from your browser — it runs on volunteer</text>
  <text x="90" y="418" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="34" fill="#9aa4b5">attendee nodes over libp2p + OrbitDB. Edge Esmeralda 2026.</text>
</svg>
