# edgeCloud worker node — run this to donate compute to the network.
#
#   cd worker && docker compose up --build -d
#
# The container runs ARBITRARY submitted code, so it is locked down hard. The
# worker supervisor runs as root but with only a 5-capability allow-list and
# no-new-privileges; it drops every individual job to an unprivileged uid
# (10002) that has NO access to /data (the worker's keys) and NO network. See
# worker/entrypoint.sh and worker/src/executor/. Hardening summary in
# ARCHITECTURE.md ("Worker sandboxing").

services:
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    # Minimal capability set. Drop everything, add back only what startup needs:
    #   NET_ADMIN — install the iptables egress firewall
    #   CHOWN     — take ownership of /data (root has no DAC_OVERRIDE here)
    #   SETUID/SETGID — drop each job to the sandbox uid via setpriv
    #   KILL      — kill a timed-out job's process group (different uid)
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - CHOWN
      - SETUID
      - SETGID
      - KILL
    security_opt:
      - no-new-privileges:true   # no setuid-binary privilege escalation
      # Docker's default seccomp profile stays enforced (do NOT set unconfined).
    read_only: true              # immutable root filesystem
    tmpfs:
      # Job scratch + any temp live here. noexec/nosuid/nodev keep it hostile: the
      # job's code is READ by node/wasmtime (which live on the read-only rootfs), so
      # the scratch never needs to be executable — a job can't drop+run a binary here.
      - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777
      - /run:rw,noexec,nosuid,nodev,size=8m
    pids_limit: 256              # fork-bomb backstop
    cpus: "1.5"
    mem_limit: 768m
    memswap_limit: 768m          # == mem_limit ⇒ no swap
    ulimits:
      nofile: 1024
      nproc: 256
      core: 0
    environment:
      # REQUIRED: your Edge Esmeralda attendee email. The worker registers its
      # identity key against it (≤25 workers/email) and refuses to start without
      # it — worker identity is accountable, not anonymous (THREAT_MODEL R-010).
      EDGECLOUD_EMAIL: "${EDGECLOUD_EMAIL:?set EDGECLOUD_EMAIL to your attendee email}"
      # Rendezvous defaults are baked into shared/src/constants.js; override here.
      # Workers dial by raw IP (the egress firewall blocks in-container DNS on some
      # hosts); /dns4 is a secondary anchor for hosts where DNS works.
      # RENDEZVOUS_MULTIADDR: "/ip4/64.23.224.76/tcp/4002/ws/p2p/12D3KooWH1ntgWwvMLg6ft6dH49akyjDrNg35QqHdRFnPUK3wnX1,/ip4/64.23.224.76/tcp/4001/p2p/12D3KooWH1ntgWwvMLg6ft6dH49akyjDrNg35QqHdRFnPUK3wnX1"
      # EDGECLOUD_HTTP_FALLBACK: "http://64.23.224.76"
      # GPU worker (optional): forward inference jobs to a host LLM endpoint. See
      # README "Optional: a GPU worker". <HOST> = 172.17.0.1 (docker bridge) or
      # 10.0.2.2 (inside a QEMU VM). Also allow it through the egress firewall.
      # EDGECLOUD_LLM_URL: "http://10.0.2.2:9090"
      # EDGECLOUD_FIREWALL_ALLOW: "10.0.2.2/32"
      # EDGECLOUD_LLM_MODELS: "lfm2.5-8b-a1b,qwen3-coder-30b-a3b"   # comma-separated; first = default
      # Local-testing escape hatches (do NOT use in production):
      # EDGECLOUD_SKIP_FIREWALL: "1"
      # EDGECLOUD_FIREWALL_ALLOW: "192.168.1.50/32"
      EDGECLOUD_DATA: /data
    volumes:
      - worker_data:/data        # persistent libp2p peerId + OrbitDB state (root-owned, 700)
    restart: unless-stopped

    # PARANOID OPTION (stronger kernel isolation; requires gVisor installed):
    #   runtime: runsc
    # Note: iptables/NET_ADMIN behave differently under gVisor — the per-uid
    # egress rule may need adjusting. Left off by default for the demo.

volumes:
  worker_data:
